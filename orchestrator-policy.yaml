project: project_history4hitl
description: >
  A recursive multi-agent swarm replacing a claude-code style framework using locally hosted
  and API-based LLMs within the pi-coding-agent harness.

roles:
  scout:
    model: marcus  # Alias for Llama3-70B-it via local API
    capabilities:
      - tool_use
      - json_output
      - bash_delegation
    provider: fractal-local # Referenced in models.json
    base_url: "http://localhost:8000/v1"
    description: "Orchestrator. Handles file I/O, drafts code, recursively runs tests, and delegates via pi CLI."
    instructions: "Read AGENTS.md for execution loops and recursive execution using pi."
    max_iterations: 3
    fallback_to: worker

  worker:
    model: larry   # Alias for gemini-flash-latest
    description: "Logic specialist. Delegated to by Marcus via 'pi -p --model larry' for data parsing."
    max_iterations: 2
    fallback_to: expert

  expert:
    model: geoffrey # Alias for gemini-3.1-pro-preview
    description: "Debugger/Architect. Delegated to by Marcus if Larry fails."

policies:
  - if: task == "file_modification"
    use: scout
  - if: error_count > 3
    use: expert
  - if: token_count > 30000
    use: worker
    
sandbox:
  read_only:
    - "orchestrator-policy.yaml"
    - "AGENTS.md"
  forbidden:
    - ".env"
    - "/etc/*"
